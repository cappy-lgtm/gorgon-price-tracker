name: Weekly Price Scraper

on:
  schedule:
    - cron: '0 21 * * 0' # Runs 9 AM Monday NZDT
  workflow_dispatch: # Allows you to click "Run" manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run the scraper
        run: python scraper.py

      - name: Save the results
        run: |
          git config --global user.name "GorgonBot"
          git config --global user.email "bot@gorgon.co.nz"
          git add price_history.csv
          git pull --rebase origin main
          git commit -m "Update prices for $(date)" || exit 0
          git push origin main